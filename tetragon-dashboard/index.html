<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>OpenClaw · Tetragon Visibility</title>
<meta name="color-scheme" content="dark"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0c0c0e;--surface:#141417;--border:#232329;--border-hl:#3a3a44;--text:#e4e4e9;--text2:#9d9da8;--text3:#63636e;--accent:#6366f1;--green:#34d399;--red:#f87171;--amber:#fbbf24;--violet:#a78bfa;--rose:#fb7185;--orange:#fb923c;--mono:'SFMono-Regular',Menlo,Monaco,'Cascadia Code','Liberation Mono',monospace;--sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;--sidebar-width:220px}
html{background:var(--bg);color:var(--text);font:14px/1.5 var(--sans);-webkit-font-smoothing:antialiased}
body{min-height:100vh;display:flex}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
/* Sidebar nav */
.sidebar{position:fixed;top:0;left:0;bottom:0;width:var(--sidebar-width);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:50;overflow:hidden}
.sidebar-brand{padding:20px 16px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.sidebar-brand h1{font-size:15px;font-weight:700;letter-spacing:.3px;line-height:1.2}
.sidebar-brand .sub{font-size:10px;color:var(--text3);margin-top:2px;letter-spacing:.05em;text-transform:uppercase}
.sidebar-brand .back{font-size:11px;color:var(--text3);display:block;margin-bottom:8px}
.sidebar-nav{flex:1;overflow-y:auto;padding:12px 8px;scrollbar-width:none}
.sidebar-nav::-webkit-scrollbar{display:none}
.sidebar-section{margin-bottom:16px}
.sidebar-section-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.12em;color:var(--text3);padding:4px 10px 6px;user-select:none}
.sidebar-nav button{display:flex;align-items:center;gap:9px;width:100%;background:none;border:none;color:var(--text2);font:13px/1.2 var(--sans);padding:8px 10px;border-radius:7px;cursor:pointer;text-align:left;transition:background .12s,color .12s;white-space:nowrap}
.sidebar-nav button:hover{background:rgba(255,255,255,.05);color:var(--text)}
.sidebar-nav button.active{background:rgba(99,102,241,.12);color:var(--text);font-weight:500}
.sidebar-nav button svg{width:16px;height:16px;flex-shrink:0;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;opacity:.7}
.sidebar-nav button.active svg{opacity:1;color:var(--accent)}
.sidebar-footer{flex-shrink:0;padding:10px 14px;border-top:1px solid var(--border);display:flex;align-items:stretch;justify-content:space-between;gap:8px}
.sidebar-footer .ks-panel{display:flex;flex-direction:column;gap:4px;align-items:stretch;width:100%}
.sidebar-footer .ks-btn{font-size:10px;padding:5px 8px;border-radius:5px;justify-content:center}
.sidebar-footer .ks-dot{width:5px;height:5px}
/* Main content area */
.shell{margin-left:var(--sidebar-width);flex:1;padding:24px 28px 48px;max-width:1100px;min-height:100vh}
.shell-header{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.shell-header h2{font-size:20px;font-weight:600;letter-spacing:.2px}
.shell-header .sub{font-size:12px;color:var(--text3);margin-top:2px}
/* Hide old top tabs (replaced by sidebar) */
.tabs{display:none}
.controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:8px}
.controls .range{display:flex;gap:2px;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:2px}
.controls .range button{background:none;border:none;color:var(--text3);font:12px/1 var(--sans);padding:5px 10px;border-radius:4px;cursor:pointer}
.controls .range button.active{background:rgba(255,255,255,.08);color:var(--text)}
.controls input,.controls select{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:5px 10px;font:12px/1.4 var(--sans);color:var(--text);outline:none}
.controls input:focus,.controls select:focus{border-color:var(--border-hl)}
/* Quick filter chips */
.quick-filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.qlabel{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--text3)}
.qfilt{background:var(--surface);border:1px solid var(--border);border-radius:20px;color:var(--text2);font-size:11px;padding:3px 10px;cursor:pointer;transition:background .12s,border-color .12s,color .12s;white-space:nowrap}
.qfilt:hover{background:rgba(255,255,255,.06);border-color:var(--border-hl);color:var(--text)}
.qfilt.active{background:rgba(99,102,241,.18);border-color:var(--accent);color:var(--text);font-weight:500}
/* Stat cards */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:20px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px}
.card .label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.12em;color:var(--text3);margin-bottom:8px}
.card .value{font-size:22px;font-weight:600;color:var(--text)}
.card .sub{font-size:11px;color:var(--text3);margin-top:4px}
.card .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;vertical-align:middle}
.dot.up{background:var(--green)}.dot.down{background:var(--red)}
/* Activity feed */
.feed{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.feed-item{display:flex;gap:10px;align-items:flex-start;padding:9px 12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;font-size:12px;cursor:pointer;transition:background .1s,border-color .1s}
.feed-item:hover{background:rgba(255,255,255,.04);border-color:var(--border-hl)}
.feed-item.selected{border-left:3px solid var(--accent);background:rgba(99,102,241,.07)}
.feed-item.severity-notable{border-left:3px solid var(--amber)}
.feed-item.severity-notable.selected{border-left:3px solid var(--accent)}
.feed-item.severity-critical{border-left:3px solid var(--red)}
.feed-item.severity-critical.selected{border-left:3px solid var(--accent)}
.feed-item .time{color:var(--text3);font-variant-numeric:tabular-nums;min-width:72px;flex-shrink:0}
.feed-item .kind{font-weight:600;min-width:84px;flex-shrink:0}
.feed-item .body{flex:1;overflow:hidden;text-overflow:ellipsis}
.feed-item .mono{font-family:var(--mono);font-size:11px}
.feed-item .tag{font-size:10px;padding:2px 6px;border-radius:4px;margin-right:4px}
.tag.session{background:rgba(99,102,241,.15);color:var(--accent)}
.tag.tetragon{background:rgba(167,139,250,.15);color:var(--violet)}
/* Tables */
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.table-wrap table{width:100%;border-collapse:collapse;font-size:12px}
.table-wrap thead{background:rgba(255,255,255,.03)}
.table-wrap th{padding:8px 12px;text-align:left;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);border-bottom:1px solid var(--border)}
.table-wrap td{padding:7px 12px;border-bottom:1px solid rgba(255,255,255,.03);color:var(--text2);max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.table-wrap tr:last-child td{border-bottom:none}
.table-wrap .mono{font-family:var(--mono);font-size:11px}
.table-wrap .hl{color:var(--text)}
.table-wrap .time{color:var(--text3);font-variant-numeric:tabular-nums}
.table-wrap tr.severity-notable{background:rgba(251,191,36,.06)}
.table-wrap tr.severity-critical{background:rgba(248,113,113,.08)}
.table-wrap tr.clickable{cursor:pointer}
.table-wrap tr.clickable:hover{background:rgba(255,255,255,.04)}
.table-wrap tr.selected{background:rgba(99,102,241,.12)!important;outline:1px solid rgba(99,102,241,.4) inset}
.table-wrap .footer{padding:8px 12px;font-size:11px;color:var(--text3);border-top:1px solid var(--border);background:rgba(255,255,255,.02)}
/* Tags */
.tag.exec{background:rgba(99,102,241,.12);color:var(--accent)}
.tag.net{background:rgba(167,139,250,.12);color:var(--violet)}
.tag.file{background:rgba(251,113,133,.12);color:var(--rose)}
.tag.skill{background:rgba(251,146,60,.12);color:var(--orange)}
/* Op badges */
.badge-open{background:rgba(99,102,241,.2);color:var(--accent);padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600}
.badge-write{background:rgba(251,191,36,.2);color:var(--amber);padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600}
.badge-delete{background:rgba(248,113,113,.2);color:var(--red);padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600}
/* Header enforcing badge */
.header-enforcing{background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:3px 8px;border-radius:4px;margin-left:8px}
/* Mode badges */
.mode-badge.monitor{color:var(--green);font-weight:600}
.mode-badge.enforce{color:var(--red);font-weight:600}
/* Kill switch buttons */
.ks-panel{display:flex;gap:7px;align-items:center}
.ks-btn{background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:7px;color:var(--text2);font:11px/1 var(--sans);font-weight:600;padding:8px 13px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px;white-space:nowrap}
.ks-btn:hover{background:rgba(255,255,255,.1);color:var(--text)}
.ks-btn.active{background:rgba(248,113,113,.18);border-color:var(--red);color:var(--red)}
.ks-btn.active:hover{background:rgba(248,113,113,.28)}
.ks-dot{width:7px;height:7px;border-radius:50%;background:currentColor;flex-shrink:0;transition:background .15s}
/* Modal overlay */
#modal-overlay{position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.72);display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(3px)}
#modal-box{background:var(--surface);border:1px solid var(--border-hl);border-radius:14px;max-width:780px;width:100%;max-height:84vh;overflow-y:auto;padding:24px 26px;position:relative;box-shadow:0 24px 80px rgba(0,0,0,.6)}
/* Detail drawer content (reused inside modal) */
.drawer-header{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:14px}
.drawer-header h3{font-size:14px;font-weight:600;line-height:1.4;margin:0}
.drawer-close{background:none;border:1px solid var(--border);border-radius:6px;color:var(--text3);cursor:pointer;font-size:13px;line-height:1;padding:4px 10px;flex-shrink:0}
.drawer-close:hover{color:var(--text);border-color:var(--border-hl)}
.drawer-grid{display:grid;grid-template-columns:auto 1fr;gap:5px 20px;margin-bottom:10px}
.drawer-key{color:var(--text3);font-size:12px}
.drawer-val{font-family:var(--mono);font-size:11px;word-break:break-all}
.drawer-pre{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px;overflow:auto;font-size:11px;white-space:pre-wrap;word-break:break-all;margin:8px 0;line-height:1.55}
.drawer-enforce{display:flex;align-items:center;gap:10px;padding:8px 0;flex-wrap:wrap}
/* Session context section inside modal */
.session-ctx{background:rgba(99,102,241,.06);border:1px solid rgba(99,102,241,.2);border-radius:8px;padding:12px 14px;margin:12px 0}
.session-ctx-item{padding:5px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:12px}
.session-ctx-item:last-child{border-bottom:none}
.session-ctx-time{color:var(--text3);font-size:10px;font-variant-numeric:tabular-nums}
.session-ctx-kind{display:inline-block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:1px 5px;border-radius:3px;margin:0 4px;background:rgba(99,102,241,.18);color:var(--accent)}
.payload-note{font-size:11px;color:var(--text3);background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:6px;padding:8px 10px;margin-top:8px;line-height:1.6}
/* Buttons */
.btn{background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:6px;color:var(--text2);font:12px/1 var(--sans);padding:5px 14px;cursor:pointer;transition:background .1s,color .1s}
.btn:hover{background:rgba(255,255,255,.1);color:var(--text)}
.btn:disabled{opacity:.4;cursor:default}
.btn.danger{border-color:var(--red);color:var(--red)}
.btn.danger:hover{background:rgba(248,113,113,.12)}
.btn.primary{border-color:var(--accent);color:var(--accent)}
.btn.primary:hover{background:rgba(99,102,241,.12)}
/* Policy cards */
.policy-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:10px}
.ks-policy-card{border-color:rgba(248,113,113,.25)}
.ks-policy-card.ks-active{border-color:var(--red);background:rgba(248,113,113,.05)}
.ks-section-head{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--text3);margin:24px 0 6px;display:flex;align-items:center;gap:8px}
.ks-section-desc{font-size:12px;color:var(--text3);margin-bottom:12px;line-height:1.6}
.ks-countdown{font-variant-numeric:tabular-nums;font-weight:700;color:var(--red)}
.tag.ks{background:rgba(248,113,113,.15);color:var(--red)}
.policy-textarea{width:100%;min-height:220px;max-height:400px;background:var(--bg);border:1px solid var(--border-hl);border-radius:6px;color:var(--text);font:11px/1.6 var(--mono);padding:10px;resize:vertical;outline:none;margin-top:8px;tab-size:2}
.policy-textarea:focus{border-color:var(--accent)}
.yaml-pre{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px;font:11px/1.6 var(--mono);max-height:320px;overflow:auto;white-space:pre;margin-top:8px}
.policy-save-row{display:flex;gap:8px;margin-top:8px;align-items:center;flex-wrap:wrap}
.save-msg{font-size:11px;color:var(--green)}
.save-err{font-size:11px;color:var(--red)}
.policy-warn{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.35);border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:13px}
/* Misc */
.empty{padding:32px;text-align:center;color:var(--text3);font-size:13px}
.loading{padding:48px;text-align:center;color:var(--text3)}
/* ── File Viewer Modal ── */
#file-modal-overlay{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.85);display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
#file-modal-box{background:var(--surface);border:1px solid var(--border-hl);border-radius:12px;max-width:920px;width:100%;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 32px 80px rgba(0,0,0,.7);overflow:hidden}
.file-modal-header{padding:13px 18px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;justify-content:space-between;align-items:flex-start;gap:12px;background:rgba(255,255,255,.02)}
.file-modal-title{font-size:13px;font-weight:600;font-family:var(--mono);color:var(--text)}.file-modal-sub{font-size:11px;color:var(--text3);margin-top:3px}
#file-modal-body{flex:1;overflow:auto}
.file-lines{counter-reset:line}.file-line{display:flex;min-height:1.7em;font:11px/1.7 var(--mono)}.file-line:hover{background:rgba(255,255,255,.025)}
.file-line.highlighted{background:rgba(248,113,113,.12);border-left:3px solid var(--red)}
.file-line-num{color:var(--text3);padding:0 10px;user-select:none;text-align:right;min-width:46px;flex-shrink:0;border-right:1px solid rgba(255,255,255,.06);margin-right:12px;font-size:10px;line-height:inherit}
.file-line.highlighted .file-line-num{color:var(--red);font-weight:700}
.file-line-content{flex:1;white-space:pre;padding-right:16px;color:var(--text2)}
.file-line.highlighted .file-line-content{color:var(--text)}
.file-issue-banner{padding:10px 16px;background:rgba(248,113,113,.08);border-bottom:1px solid rgba(248,113,113,.2);font-size:11px;color:var(--text2);line-height:1.5;flex-shrink:0}
/* ── Scanner Settings Panel ── */
.scanner-settings{background:var(--surface);border:1px solid var(--border-hl);border-radius:10px;padding:16px;margin-bottom:14px}
.scanner-settings-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.scanner-settings-head h3{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text2)}
.settings-row{display:flex;gap:20px;flex-wrap:wrap}
.settings-group{flex:1;min-width:200px}
.settings-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);margin-bottom:6px;display:block}
.preset-btn{background:none;border:1px solid var(--border);border-radius:5px;color:var(--text2);font:12px/1 var(--sans);font-weight:500;padding:6px 13px;cursor:pointer;transition:all .12s}
.preset-btn:hover{background:rgba(255,255,255,.06);color:var(--text);border-color:var(--border-hl)}
.preset-btn.active{background:rgba(99,102,241,.15);color:var(--text);border-color:rgba(99,102,241,.45)}
.toggle-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.toggle-sw{position:relative;display:inline-block;width:32px;height:18px;flex-shrink:0}
.toggle-sw input{opacity:0;width:0;height:0;position:absolute}
.toggle-slider{position:absolute;cursor:pointer;inset:0;background:var(--border-hl);border-radius:9px;transition:.2s}
.toggle-slider:before{position:absolute;content:'';height:12px;width:12px;left:3px;bottom:3px;background:var(--text3);border-radius:50%;transition:.2s}
.toggle-sw input:checked+.toggle-slider{background:var(--accent)}.toggle-sw input:checked+.toggle-slider:before{transform:translateX(14px);background:#fff}
.aidefense-panel{background:rgba(99,102,241,.05);border:1px solid rgba(99,102,241,.2);border-radius:8px;padding:14px;margin-top:12px}
.aidefense-panel h4{font-size:12px;font-weight:600;color:var(--accent);margin-bottom:6px;display:flex;align-items:center;gap:8px}
.settings-input{width:100%;background:var(--bg);border:1px solid var(--border-hl);border-radius:6px;padding:7px 10px;font:12px/1 var(--mono);color:var(--text);outline:none;transition:border-color .15s;box-sizing:border-box}
.settings-input:focus{border-color:var(--accent)}
/* ── Analyzer tags ── */
.analyzer-tag{display:inline-flex;align-items:center;font-size:9px;font-weight:700;padding:2px 7px;border-radius:3px;letter-spacing:.04em;text-transform:uppercase;vertical-align:middle}
.analyzer-tag.static,.analyzer-tag.staticanalyzer{background:rgba(99,102,241,.14);color:var(--accent)}
.analyzer-tag.behavioral{background:rgba(52,211,153,.1);color:var(--green)}
.analyzer-tag.pipeline{background:rgba(251,191,36,.1);color:var(--amber)}
.analyzer-tag.llm{background:rgba(167,139,250,.12);color:var(--violet)}
.analyzer-tag.aidefense,.analyzer-tag.aidefenseanalyzer{background:rgba(248,113,113,.1);color:var(--rose)}
.analyzer-tag.bytecode{background:rgba(251,146,60,.1);color:var(--orange)}
/* Scanner tab */
.scanner-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:16px}
.scanner-stat{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 14px}
.scanner-stat .label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);margin-bottom:4px}
.scanner-stat .value{font-size:20px;font-weight:700}
.scanner-progress{margin-bottom:14px}
.scanner-progress-bar{height:5px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden}
.scanner-progress-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .3s ease}
.scanner-skill{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:12px 14px;margin-bottom:6px;cursor:pointer;transition:border-color .12s,background .12s}
.scanner-skill:hover{border-color:var(--border-hl);background:rgba(255,255,255,.02)}
.scanner-skill.expanded{border-color:var(--accent);background:rgba(99,102,241,.04)}
.scanner-skill-head{display:flex;justify-content:space-between;align-items:center;gap:10px}
.scanner-skill-name{font-weight:600;font-size:13px}
.scanner-skill-desc{font-size:11px;color:var(--text3);margin-top:3px;line-height:1.5}
.scanner-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;letter-spacing:.04em;text-transform:uppercase}
.scanner-badge.clean{background:rgba(52,211,153,.12);color:var(--green)}
.scanner-badge.info{background:rgba(157,157,168,.12);color:var(--text2)}
.scanner-badge.low{background:rgba(157,157,168,.12);color:var(--text2)}
.scanner-badge.medium{background:rgba(251,191,36,.12);color:var(--amber)}
.scanner-badge.high{background:rgba(248,113,113,.12);color:var(--red)}
.scanner-badge.critical{background:rgba(162,28,175,.12);color:#c084fc}
.scanner-badge.scanning{background:rgba(99,102,241,.12);color:var(--accent)}
.scanner-badge.error{background:rgba(248,113,113,.12);color:var(--red)}
.scanner-findings{padding:8px 0 4px 12px;border-left:2px solid var(--border)}
.scanner-finding{padding:8px 12px;border:1px solid var(--border);border-radius:7px;background:var(--bg);margin-bottom:5px}
.scanner-finding-title{font-weight:600;font-size:12px;color:var(--text);margin-bottom:2px}
.scanner-finding-desc{font-size:11px;color:var(--text2);line-height:1.5}
.scanner-finding-meta{font-size:10px;color:var(--text3);margin-top:3px;font-family:var(--mono)}
.scanner-about{background:var(--surface);border:1px solid var(--border);border-radius:9px;padding:14px 16px;margin-top:16px}
.scanner-about h4{font-size:12px;font-weight:600;margin-bottom:6px}
.scanner-about p{font-size:11px;color:var(--text3);line-height:1.6}
/* ── Scan logs ── */
.scanner-logs-section{background:var(--surface);border:1px solid var(--border);border-radius:9px;margin-top:16px;overflow:hidden}
.scanner-logs-header{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;gap:8px;border-bottom:1px solid transparent;transition:background .15s}
.scanner-logs-section:has(.scan-log-list) .scanner-logs-header{border-bottom-color:var(--border)}
.scan-log-toggle-btn{display:flex;align-items:center;gap:8px;background:none;border:none;color:inherit;cursor:pointer;padding:0;flex:1;text-align:left;min-width:0}
.scan-log-toggle-btn:hover{opacity:.85}
.scan-log-chevron{font-size:13px;color:var(--text3)}
.scan-log-count{font-size:10px;padding:1px 7px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text2);font-weight:600}
.scan-log-list{max-height:440px;overflow-y:auto;padding:8px 0}
.scan-log-entry{display:flex;align-items:flex-start;gap:10px;padding:8px 14px;border-bottom:1px solid var(--border);transition:background .12s}
.scan-log-entry:last-child{border-bottom:none}
.scan-log-entry:hover{background:rgba(255,255,255,.03)}
.scan-log-entry[data-phase="start"]{opacity:.75}
.scan-log-icon{font-size:13px;margin-top:1px;flex-shrink:0;width:14px;text-align:center}
.scan-log-body{flex:1;min-width:0}
.scan-log-top{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:3px}
.scan-log-skill{font-weight:600;font-size:12px;color:var(--text)}
.scan-log-analyzers{display:flex;gap:4px;flex-wrap:wrap}
.scan-log-msg{font-size:12px;color:var(--text2);line-height:1.4}
.scan-log-time{font-size:10px;color:var(--text3);margin-left:auto;white-space:nowrap}
.scan-meta-pill{font-size:10px;color:var(--text3)}
.scan-meta-line{font-size:10px;color:var(--text3);margin-top:2px}
.scan-badge{font-size:10px;padding:1px 6px;border-radius:4px;font-weight:600}
.scan-badge-ok{background:rgba(52,211,153,.12);color:var(--green)}
.scan-badge-err{background:rgba(248,113,113,.12);color:var(--red)}
/* command block */
.scan-cmd-block{display:flex;align-items:flex-start;gap:6px;margin-top:6px;background:rgba(0,0,0,.25);border:1px solid var(--border);border-radius:5px;padding:5px 8px}
.scan-cmd-label{font-size:9px;font-weight:700;color:var(--text3);background:var(--surface2);border-radius:3px;padding:1px 4px;flex-shrink:0;margin-top:1px;letter-spacing:.05em}
.scan-cmd-code{font-family:monospace;font-size:11px;color:var(--text2);word-break:break-all;white-space:pre-wrap;flex:1}
/* output expand buttons */
.scan-output-btns{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.scan-output-btn{font-size:11px;padding:3px 9px;background:rgba(99,102,241,.08);border:1px solid rgba(99,102,241,.2);color:var(--accent);border-radius:5px;cursor:pointer;display:flex;align-items:center;gap:4px;transition:background .12s}
.scan-output-btn:hover{background:rgba(99,102,241,.16)}
.scan-output-btn-err{background:rgba(248,113,113,.07);border-color:rgba(248,113,113,.2);color:var(--red)}
.scan-output-btn-err:hover{background:rgba(248,113,113,.14)}
/* raw output panels */
.scan-raw-pre{margin-top:6px;padding:10px 12px;background:rgba(0,0,0,.35);border:1px solid var(--border);border-radius:6px;font-family:monospace;font-size:11px;line-height:1.55;white-space:pre-wrap;word-break:break-all;max-height:400px;overflow-y:auto;color:var(--text2)}
.scan-raw-stdout{border-color:rgba(99,102,241,.25)}
.scan-raw-stderr{border-color:rgba(248,113,113,.25);color:var(--red)}
/* ── About / README rendered markdown ── */
.md-body{line-height:1.7;color:var(--text2);max-width:820px}
.md-body h1{font-size:24px;font-weight:700;color:var(--text);margin:0 0 8px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.md-body h2{font-size:18px;font-weight:700;color:var(--text);margin:32px 0 12px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.md-body h3{font-size:15px;font-weight:600;color:var(--text);margin:24px 0 8px}
.md-body h4{font-size:13px;font-weight:600;color:var(--text);margin:18px 0 6px}
.md-body p{margin:0 0 12px;font-size:13px}
.md-body ul,.md-body ol{margin:0 0 12px;padding-left:24px;font-size:13px}
.md-body li{margin-bottom:4px}
.md-body hr{border:none;border-top:1px solid var(--border);margin:24px 0}
.md-body a{color:var(--accent)}
.md-body strong{color:var(--text);font-weight:600}
.md-body code{background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:4px;padding:1px 5px;font-family:var(--mono);font-size:12px;color:var(--accent)}
.md-body pre{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:14px 16px;overflow-x:auto;margin:0 0 14px;line-height:1.5}
.md-body pre code{background:none;border:none;padding:0;font-size:11px;color:var(--text2)}
.md-body table{width:100%;border-collapse:collapse;margin:0 0 16px;font-size:12px}
.md-body th{text-align:left;padding:8px 12px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);border-bottom:2px solid var(--border);background:rgba(255,255,255,.02)}
.md-body td{padding:7px 12px;border-bottom:1px solid rgba(255,255,255,.04);color:var(--text2)}
.md-body blockquote{border-left:3px solid var(--accent);padding:8px 16px;margin:0 0 12px;background:rgba(99,102,241,.04);border-radius:0 6px 6px 0;font-size:13px;color:var(--text2)}
.md-body .mermaid{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:20px;margin:0 0 14px;overflow-x:auto}
.md-body .mermaid svg{max-width:100%}
@media(max-width:900px){
  .sidebar{width:60px}
  .sidebar-brand .sub,.sidebar-brand .back,.sidebar-brand h1,.sidebar-section-label,.sidebar-nav button span:not(svg){display:none}
  .sidebar-brand{padding:12px 10px}
  .sidebar-nav button{justify-content:center;padding:10px}
  .sidebar-footer{flex-direction:column;padding:8px 6px}
  .shell{margin-left:60px}
}

<!-- Modal overlay: fixed-position, outside .shell, never wiped by tab/data refresh -->
<div id="modal-overlay" style="display:none" role="dialog" aria-modal="true">
  <div id="modal-box"></div>
</div>

<script>
(()=>{
const $content      = document.getElementById('content');
const $modalOverlay = document.getElementById('modal-overlay');
const $modalBox     = document.getElementById('modal-box');

// ─── State ────────────────────────────────────────────────────────────────────
let tab = localStorage.getItem('oc-dash-tab') || 'activity', since = '1h', filters = {};
// Sync the sidebar highlight to the restored tab on load
document.querySelectorAll('#sidebar-nav button[data-tab]').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
let currentTableEvents = [];
let activityEvents = [];
let selectedEvent = null;
let policiesData = { policies: [] };
let policyEditorState = {};   // { [name]: { open, content, editing } }
let policyYamlScrollTops = {}; // preserved across policy re-renders so YAML pre/textarea scroll doesn't jump
let ksSectionScrollTops = {};  // same for kill switch section YAML viewers when only #ks-section is re-rendered
let ksState = { exec: { active: false, remainingSeconds: null }, net: { active: false, remainingSeconds: null } };
let ksClientCountdown = { exec: null, net: null };
let ksCountdownInterval = null;
let readmeCache = null;

if (typeof mermaid !== 'undefined') {
  mermaid.initialize({ startOnLoad: false, theme: 'dark', themeVariables: {
    primaryColor: '#6366f1', primaryTextColor: '#e4e4e9', primaryBorderColor: '#6366f1',
    lineColor: '#63636e', secondaryColor: '#1e1e2e', tertiaryColor: '#141417',
    background: '#0c0c0e', mainBkg: '#141417', nodeBorder: '#6366f1',
    clusterBkg: '#141417', clusterBorder: '#232329', titleColor: '#e4e4e9',
    edgeLabelBackground: '#141417', nodeTextColor: '#e4e4e9',
  }});
}

// ─── Tab switching ────────────────────────────────────────────────────────────
document.getElementById('sidebar-nav').addEventListener('click', e => {
  const btn = e.target.closest('button[data-tab]');
  if (!btn) return;
  tab = btn.dataset.tab;
  localStorage.setItem('oc-dash-tab', tab);
  filters = {};
  closeModal();
  window.scrollTo(0, 0);
  document.querySelectorAll('#sidebar-nav button').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  poll();
});

// Close modal on overlay backdrop click or Escape key
$modalOverlay.addEventListener('click', e => { if (e.target === $modalOverlay) closeModal(); });
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.getElementById('file-modal-overlay').style.display !== 'none') { closeFileModal(); }
    else { closeModal(); }
  }
});

// ─── Helpers ──────────────────────────────────────────────────────────────────
function fmt(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleTimeString(undefined, {hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
function shortBin(p) { return p ? p.split('/').pop() : '?'; }
function esc(s) { const d = document.createElement('div'); d.textContent = (s == null ? '' : String(s)); return d.innerHTML; }
function setContent(html) {
  const sy = window.scrollY;
  $content.innerHTML = html;
  if (sy > 0) requestAnimationFrame(() => window.scrollTo(0, sy));
}
function opBadge(op) {
  if (op === 'write')  return '<span class="badge-write">write</span>';
  if (op === 'delete') return '<span class="badge-delete">delete</span>';
  return '<span class="badge-open">open</span>';
}
function policyDesc(name) {
  const d = {
    'oc-file-ops':        'File open / write / delete on workspace and sensitive paths',
    'oc-tool-exec':       'Execution of tool binaries (curl, git, python, clawhub, etc.)',
    'oc-llm-api-egress':  'Outbound TCP connections — LLM API egress',
    'oc-skill-sandbox':   'Exec and file access originating from skills / clawhub',
    'oc-ks-exec':         'Temporary lockout — blocks all subprocess/tool execution (execve). Auto-expires after 60s.',
    'oc-ks-net':          'Temporary lockout — blocks all outbound TCP connections. Auto-expires after 60s.',
  };
  return d[name] || name;
}
// Stable identity key for an event — used to re-match after refresh
function evKey(ev) {
  if (!ev) return '';
  return `${ev.time||''}|${ev.process||''}|${ev.path||ev.remote||ev.args||ev.kind||''}`;
}

// ─── Modal event detail ───────────────────────────────────────────────────────
// Opens as a fixed-position centered overlay — never scrolls to bottom.
function openModal(ev) {
  selectedEvent = ev;
  const policyName = ev.policy || '';
  const mode = (policiesData.policies.find(p => p.name === policyName) || {}).mode || 'monitor';
  const isNetEvent = !!(ev.remote);

  let contentSection = '';
  if (ev.content && ev.content !== 'CharBufErrorUnknown') {
    const preview = String(ev.content).slice(0, 8192);
    contentSection = `<h4 style="margin:14px 0 4px;font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--text3)">Content written to file</h4>
      <pre class="drawer-pre" style="max-height:320px">${esc(preview)}${ev.contentTruncated ? '\n\n… [truncated — only first 4 KB captured by eBPF]' : ''}</pre>`;
  }
  let argsSection = '';
  if (ev.args && ev.args.length > 90) {
    argsSection = `<h4 style="margin:14px 0 4px;font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--text3)">Full arguments</h4>
      <pre class="drawer-pre">${esc(ev.args)}</pre>`;
  }

  // Session context placeholder (filled async for net events)
  const sessionCtxSection = isNetEvent ? `
    <h4 style="margin:14px 0 6px;font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--text3)">Session context at this time</h4>
    <div id="modal-session-ctx" class="session-ctx"><span style="color:var(--text3);font-size:11px">Fetching session context…</span></div>
    <div class="payload-note">
      ℹ For <strong>encrypted HTTPS</strong> connections the raw request payload is not visible at the kernel syscall level —
      the session context above shows what the agent was doing when this connection was established.
      For <strong>local HTTP</strong> (VLLM on :8000) a write-capture policy can expose raw bytes.
    </div>` : '';

  const rawJson = esc(JSON.stringify(ev, null, 2));
  const title = `${esc(ev.kind || ev.operation || 'event')} · ${esc(shortBin(ev.process || ''))} · ${fmt(ev.time)}`;

  $modalBox.innerHTML = `
    <div class="drawer-header">
      <h3>${title}</h3>
      <button class="drawer-close" id="modal-close" title="Close (Esc)">✕ close</button>
    </div>

    <div class="drawer-grid">
      <span class="drawer-key">Policy</span>
      <span class="drawer-val">${esc(policyName || '—')} <span class="mode-badge ${mode}">${mode}</span></span>

      <span class="drawer-key">Process</span>
      <span class="drawer-val">${esc(ev.process || '—')}</span>

      ${ev.pid != null ? `<span class="drawer-key">PID</span><span class="drawer-val">${esc(String(ev.pid))}${ev.ppid != null ? ` / ppid ${esc(String(ev.ppid))}` : ''}</span>` : ''}
      ${ev.cwd ? `<span class="drawer-key">CWD</span><span class="drawer-val">${esc(ev.cwd)}</span>` : ''}
      ${ev.path ? `<span class="drawer-key">Path</span><span class="drawer-val">${esc(ev.path)}</span>` : ''}
      ${ev.operation ? `<span class="drawer-key">Operation</span><span class="drawer-val">${opBadge(ev.operation)}</span>` : ''}
      ${ev.contentSize ? `<span class="drawer-key">Write size</span><span class="drawer-val">${esc(String(ev.contentSize))} bytes${ev.contentTruncated ? ' (truncated)' : ''}</span>` : ''}
      ${ev.remote ? `<span class="drawer-key">Remote</span><span class="drawer-val">${esc(ev.remoteLabel || ev.remote)}</span>` : ''}
      ${ev.proto ? `<span class="drawer-key">Protocol</span><span class="drawer-val">${esc(ev.proto)}</span>` : ''}
      ${ev.sensitive ? `<span class="drawer-key">Sensitivity</span><span class="drawer-val" style="color:var(--amber)">Sensitive path</span>` : ''}
      ${ev.outsideSkill ? `<span class="drawer-key">Sandbox</span><span class="drawer-val" style="color:var(--red)">Outside skill sandbox!</span>` : ''}
    </div>

    <p style="font-size:11px;color:var(--text3);margin-bottom:6px">${esc(policyDesc(policyName))}</p>

    <div class="drawer-enforce">
      <span style="font-size:12px;color:var(--text3)">Policy mode:</span>
      <strong class="mode-badge ${mode}">${mode}</strong>
      <button class="btn ${mode === 'enforce' ? 'danger' : ''}" id="modal-mode-btn">
        Switch to ${mode === 'monitor' ? 'enforce' : 'monitor'}
      </button>
    </div>

    ${contentSection}
    ${argsSection}
    ${sessionCtxSection}

    <details style="margin-top:12px">
      <summary style="cursor:pointer;font-size:11px;color:var(--text3);user-select:none">▶ Raw event JSON</summary>
      <pre class="drawer-pre" style="max-height:220px">${rawJson}</pre>
    </details>`;

  $modalOverlay.style.display = 'flex';
  document.getElementById('modal-close').onclick = closeModal;

  const modeBtn = document.getElementById('modal-mode-btn');
  if (modeBtn) {
    modeBtn.onclick = async () => {
      const newMode = mode === 'monitor' ? 'enforce' : 'monitor';
      modeBtn.disabled = true;
      modeBtn.textContent = 'Switching…';
      const r = await fetch(`/api/policies/${encodeURIComponent(policyName)}/mode`, {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ mode: newMode }),
      });
      const d = await r.json();
      if (d.ok) {
        policiesData.policies.forEach(p => { if (p.name === policyName) p.mode = newMode; });
        updateEnforcingBadge();
        openModal(ev);
      } else {
        alert(d.error || 'Failed');
        modeBtn.disabled = false;
        modeBtn.textContent = `Switch to ${newMode}`;
      }
    };
  }

  // Async: fetch session context for network events
  if (isNetEvent && ev.time) {
    fetchSessionContext(ev.time).then(ctx => {
      const el = document.getElementById('modal-session-ctx');
      if (el) el.innerHTML = renderSessionContext(ctx);
    });
  }

  highlightSelected();
}

function closeModal() {
  selectedEvent = null;
  $modalOverlay.style.display = 'none';
  $modalBox.innerHTML = '';

// ─── Session context (LLM payload correlation) ────────────────────────────────
async function fetchSessionContext(timeISO) {
  try {
    const r = await fetch(`/api/session-context?time=${encodeURIComponent(timeISO)}`);
    if (!r.ok) return [];
    const d = await r.json();
    return d.events || [];
  } catch { return []; }
}

function renderSessionContext(events) {
  if (!events.length) {
    return '<span style="color:var(--text3);font-size:11px">No session activity found in ±5 s window. Try expanding the time range or ensure a session is active.</span>';
  }
  return events.map(ev => {
    let body = '';
    if (ev.kind === 'user_message') {
      body = `<span style="color:var(--text)">${esc((ev.text || '').slice(0, 600))}${ev.text && ev.text.length > 600 ? '…' : ''}</span>`;
    } else if (ev.kind === 'tool_call') {
      body = `<strong style="color:var(--accent)">${esc(ev.toolName)}</strong> <span style="color:var(--text2)">${esc((ev.input || '').slice(0, 400))}${ev.input && ev.input.length > 400 ? '…' : ''}</span>`;
    } else if (ev.kind === 'tool_result') {
      body = `<span style="color:var(--text3)">${esc(ev.toolName)} →</span> <span style="color:var(--text2)">${esc((ev.resultPreview || '').slice(0, 300))}${ev.resultPreview && ev.resultPreview.length > 300 ? '…' : ''}</span>`;
    } else if (ev.kind === 'usage') {
      body = `<span style="color:var(--text3)">tokens in=${ev.inputTokens || 0} out=${ev.outputTokens || 0}${ev.estimatedCost != null ? ` · $${ev.estimatedCost.toFixed(4)}` : ''}</span>`;
    } else if (ev.kind === 'model_change') {
      body = `<span style="color:var(--text3)">${esc(ev.provider || '')} / ${esc(ev.modelId || '')}</span>`;
    } else {
      body = `<span style="color:var(--text3)">${esc(JSON.stringify(ev).slice(0, 200))}</span>`;
    }
    return `<div class="session-ctx-item">
      <span class="session-ctx-time">${fmt(ev.time)}</span>
      <span class="session-ctx-kind">${esc(ev.kind)}</span>
      ${body}
    </div>`;
  }).join('');
}

// Called after each render to re-highlight the selected row.
// Does NOT re-render the modal — modal content is stable across refreshes.
function restoreHighlight() {
  if (!selectedEvent) return;
  highlightSelected();
}

function highlightSelected() {
  const key = evKey(selectedEvent);
  document.querySelectorAll('.table-wrap tr.clickable').forEach(tr => {
    const i = parseInt(tr.dataset.eventIndex, 10);
    const ev = currentTableEvents[i];
    tr.classList.toggle('selected', !!(key && ev && evKey(ev) === key));

  document.querySelectorAll('.feed-item[data-feed-index]').forEach(fi => {
    const i = parseInt(fi.dataset.feedIndex, 10);
    const ev = activityEvents[i];
    fi.classList.toggle('selected', !!(key && ev && evKey(ev) === key));
  });
}

function quickFilterChips(type) {
  const chips = QUICK_FILTERS[type] || [];
  if (!chips.length) return '';
  const html = chips.map(c => {
    const active = filters[c.field] === c.value ? ' active' : '';
    return `<button class="qfilt${active}" data-field="${esc(c.field)}" data-value="${esc(c.value)}">${esc(c.label)}</button>`;
  }).join('');
  return `<div class="quick-filters"><span class="qlabel">Quick filters:</span>${html}</div>`;
}

function bindQuickFilters() {
  document.querySelectorAll('.qfilt').forEach(btn => {
    btn.onclick = () => {
      const { field, value } = btn.dataset;
      if (filters[field] === value) {
        delete filters[field];
        // sync text input if present
        const inp = document.querySelector(`.controls input[data-filter="${field}"]`);
        if (inp) inp.value = '';
      } else {
        filters[field] = value;
        const inp = document.querySelector(`.controls input[data-filter="${field}"]`);
        if (inp) inp.value = value;
      }
      poll();
    };
  });
}

// ─── Controls bar ─────────────────────────────────────────────────────────────
function rangeButtons() {
  return ['15m', '1h', '6h', '24h', ''].map(v =>
    `<button data-since="${v}" class="${since === v ? 'active' : ''}">${v || 'All'}</button>`
  ).join('');
}
function controls(type) {
  let inp = '';
  if (type === 'tools')   inp = `<input type="text" placeholder="Search process / args…" data-filter="q" value="${esc(filters.q || '')}">`;
  if (type === 'llm')     inp = `<input type="text" placeholder="Filter remote address…" data-filter="remote" value="${esc(filters.remote || '')}">`;
  if (type === 'fileops') inp = `<input type="text" placeholder="Filter path…" data-filter="path" value="${esc(filters.path || '')}">`;
  if (type === 'skills')  inp = `<input type="text" placeholder="Filter path…" data-filter="path" value="${esc(filters.path || '')}">`;
  return `<div class="controls"><div class="range">${rangeButtons()}</div>${inp}</div>${quickFilterChips(type)}`;
}
function bindControls() {
  document.querySelectorAll('.controls .range button').forEach(b => {
    b.onclick = () => {
      since = b.dataset.since;
      document.querySelectorAll('.controls .range button').forEach(x => x.classList.toggle('active', x.dataset.since === since));
      poll();
    };
  });
  document.querySelectorAll('.controls input[data-filter]').forEach(inp => {
    let t;
    inp.oninput = () => { clearTimeout(t); t = setTimeout(() => { filters[inp.dataset.filter] = inp.value; poll(); }, 300); };
  });
  bindQuickFilters();
}

// ─── Table renderers ──────────────────────────────────────────────────────────
function mkRow(r, i, cols, extraClass) {
  const cells = cols.map(c => `<td class="${c.cls || ''}">${c.render ? c.render(r) : esc(String(r[c.key] ?? '—'))}</td>`).join('');
  return `<tr class="clickable ${extraClass || ''}" data-event-index="${i}">${cells}</tr>`;
}
function mkHead(cols) {
  return '<thead><tr>' + cols.map(c => `<th>${c.label}</th>`).join('') + '</tr></thead>';
}
function renderTbl(cols, rows, footer, rowClassFn) {
  if (!rows.length) return `<div class="table-wrap"><div class="empty">No events.</div></div>`;
  const body = rows.map((r, i) => mkRow(r, i, cols, rowClassFn ? rowClassFn(r) : '')).join('');
  return `<div class="table-wrap"><table>${mkHead(cols)}<tbody>${body}</tbody></table><div class="footer">${esc(footer)}</div></div>`;
}

// ─── Render: About / README ──────────────────────────────────────────────────
async function renderAbout(md) {
  const renderer = new marked.Renderer();
  const origCode = renderer.code.bind(renderer);
  const mermaidBlocks = [];
  renderer.code = function({ text, lang }) {
    if (lang === 'mermaid') {
      const id = `mermaid-${mermaidBlocks.length}`;
      mermaidBlocks.push({ id, text });
      return `<div class="mermaid" id="${id}"></div>`;
    }
    return origCode({ text, lang });
  };
  const html = marked.parse(md, { renderer, gfm: true, breaks: false });
  setContent(`<div class="md-body">${html}</div>`);
  if (typeof mermaid !== 'undefined' && mermaidBlocks.length) {
    for (const { id, text } of mermaidBlocks) {
      try {
        const { svg } = await mermaid.render(id + '-svg', text);
        const el = document.getElementById(id);
        if (el) el.innerHTML = svg;
      } catch (e) {
        const el = document.getElementById(id);
        if (el) el.innerHTML = `<pre style="color:var(--red);font-size:11px">${esc(e.message)}</pre>`;
      }
    }
  }
}

// ─── Render: Activity Feed ────────────────────────────────────────────────────
function renderActivity(data) {
  activityEvents = data.events || [];
  const ctrl = controls('activity');
  if (!activityEvents.length) {
    setContent(ctrl + '<div class="empty">No activity in this time range.</div>');
    bindControls();
    restoreHighlight();
    return;
  }
  const feedHtml = activityEvents.map((ev, i) => {
    const severity = ev.severity === 'critical' ? 'severity-critical' : ev.severity === 'notable' ? 'severity-notable' : '';
    const src = ev.source === 'session' ? 'session' : 'tetragon';
    const kind = ev.kind || ev.type || 'event';
    let body = '';
    if (ev.source === 'session') {
      if (ev.kind === 'user_message')  body = esc((ev.text || '').slice(0, 140)) + (ev.text && ev.text.length > 140 ? '…' : '');
      else if (ev.kind === 'tool_call')   body = `<span class="mono">${esc(ev.toolName)}</span> ${esc((ev.input || '').slice(0, 80))}${ev.input && ev.input.length > 80 ? '…' : ''}`;
      else if (ev.kind === 'tool_result') body = `<span class="mono">${esc(ev.toolName)}</span> → ${esc((ev.resultPreview || '').slice(0, 60))}${ev.resultPreview && ev.resultPreview.length > 60 ? '…' : ''}`;
      else if (ev.kind === 'usage')       body = `tokens in=${ev.inputTokens || 0} out=${ev.outputTokens || 0} cost=$${(ev.estimatedCost || 0).toFixed(4)}`;
      else if (ev.kind === 'model_change') body = `${esc(ev.provider || '')} / ${esc(ev.modelId || '')}`;
      else body = esc(JSON.stringify(ev).slice(0, 100));
    } else {
      if (ev.kind === 'exec')
        body = `<span class="mono">${esc(shortBin(ev.process))}</span> ${esc((ev.args || '').slice(0, 80))}${ev.args && ev.args.length > 80 ? '…' : ''}`;
      else if (ev.kind === 'net')
        body = esc(ev.remoteLabel || ev.remote || '') + (ev.unknownEgress ? ' <span style="color:var(--amber)">(unknown egress)</span>' : '');
      else if (ev.kind === 'file')
        body = opBadge(ev.operation || 'open') + ' <span class="mono">' + esc(ev.path) + '</span>'
          + (ev.sensitive ? ' <span style="color:var(--amber)">sensitive</span>' : '')
          + (ev.outsideSkill && ev.fromSkill ? ' <span style="color:var(--red)">skill outside sandbox</span>' : '');
      else body = esc(shortBin(ev.process)) + ' ' + esc(ev.path || ev.remote || '');
    }
    return `<div class="feed-item ${severity}" data-feed-index="${i}"><span class="time">${fmt(ev.time)}</span><span class="kind"><span class="tag ${src}">${src}</span> ${esc(kind)}</span><span class="body">${body}</span></div>`;
  }).join('');

  setContent(ctrl + `<div class="feed">${feedHtml}</div><div class="table-wrap"><div class="footer">${data.total} events</div></div>`);
  bindControls();
  bindFeedClicks();
}

// ─── Render: Policies ─────────────────────────────────────────────────────────
function renderPolicies() {
  // Preserve in-progress textarea edits before re-rendering
  document.querySelectorAll('textarea.policy-textarea').forEach(ta => {
    const name = ta.id.replace('yaml-editor-', '');
    if (policyEditorState[name]) policyEditorState[name].content = ta.value;
  });

  // Preserve scroll position inside each policy's YAML pre/textarea so the little window doesn't snap to top on refresh
  document.querySelectorAll('.policy-card').forEach(card => {
    const btn = card.querySelector('.policy-yaml-btn[data-name]');
    if (!btn) return;
    const el = card.querySelector('.yaml-pre') || card.querySelector('.policy-textarea');
    if (el) policyYamlScrollTops[btn.dataset.name] = el.scrollTop;
  });

  const pols  = (policiesData.policies || []).slice().sort((a, b) => a.name.localeCompare(b.name));
  const ov    = policiesData.overview || {};
  const polErr = policiesData.policiesError;
  const total = (ov.policies || pols).reduce((s, p) => s + (p.count24h || 0), 0);
  const polMap = {
    'oc-llm-api-egress': { label: 'LLM/API Egress',   tag: 'net'  },
    'oc-tool-exec':      { label: 'Tool Execution',    tag: 'exec' },
    'oc-file-ops':       { label: 'File Operations',   tag: 'file' },
    'oc-skill-sandbox':  { label: 'Skill Sandbox',     tag: 'skill'},
  };
  const anyEnforce = pols.some(p => p.mode === 'enforce');

  let html = `<div class="cards">
    <div class="card"><div class="label">Tetragon</div><div class="value"><span class="dot ${ov.status || 'down'}"></span>${ov.status === 'up' ? 'Active' : 'Down'}</div><div class="sub">Last event: ${fmt(ov.lastEventTime)}</div></div>
    <div class="card"><div class="label">Events (24h)</div><div class="value">${total.toLocaleString()}</div><div class="sub">${pols.length} policies loaded</div></div>
  </div>`;

  if (polErr) {
    html += `<div class="policy-warn" style="background:rgba(248,113,113,.12);border-color:var(--red)">
      ⚠ <strong>Policy list unavailable</strong> — the dashboard cannot query Tetragon right now.<br>
      <span style="font-size:12px">This usually means an <strong>enforced policy with Sigkill</strong> is blocking the <code>tetra</code> or <code>sh</code> process that the server uses internally. To recover, run in your terminal:<br>
      <code style="display:block;margin:6px 0;padding:4px 8px;background:rgba(0,0,0,.3);border-radius:4px">cp /usr/local/bin/tetra /tmp/tet &amp;&amp; /tmp/tet tp list</code>
      Then set the enforced policy back to monitor:<br>
      <code style="display:block;margin:6px 0;padding:4px 8px;background:rgba(0,0,0,.3);border-radius:4px">/tmp/tet tp set-mode &lt;policy-name&gt; monitor</code>
      </span>
      <span style="font-size:11px;color:var(--text3)">Error: ${esc(polErr)}</span>
    </div>`;
  }

  if (anyEnforce) {
    html += `<div class="policy-warn">⚠ One or more policies are in <strong>enforce</strong> mode — matching operations will be blocked or the process killed.</div>`;
  }

  pols.forEach(p => {
    const d  = polMap[p.name] || { label: p.name, tag: 'exec' };
    const st = policyEditorState[p.name] || {};

    let editorHtml = '';
    if (st.open && st.content !== undefined) {
      if (st.editing) {
        editorHtml = `
          <textarea class="policy-textarea" id="yaml-editor-${esc(p.name)}">${esc(st.content)}</textarea>
          <div class="policy-save-row">
            <button class="btn primary policy-save-btn" data-name="${esc(p.name)}">Save &amp; Reload</button>
            <button class="btn policy-cancel-edit-btn" data-name="${esc(p.name)}">Cancel</button>
            <span id="save-msg-${esc(p.name)}"></span>
          </div>`;
      } else {
        editorHtml = `
          <pre class="yaml-pre">${esc(st.content)}</pre>
          <div class="policy-save-row">
            <button class="btn primary policy-edit-btn" data-name="${esc(p.name)}">Edit YAML</button>
            <button class="btn policy-hide-btn" data-name="${esc(p.name)}">Hide</button>
          </div>`;
      }
    }

    html += `<div class="policy-card">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
        <div>
          <span class="tag ${d.tag}">${d.label}</span>
          <span class="mono" style="margin:0 6px">${esc(p.name)}</span>
          <span class="mode-badge ${p.mode}">${p.mode}</span>
        </div>
        <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">
          <span style="color:var(--text3);font-size:12px">${p.count24h != null ? p.count24h.toLocaleString() + ' events (24h)' : ''}</span>
          <button class="btn policy-mode-btn" data-name="${esc(p.name)}" data-mode="${p.mode === 'monitor' ? 'enforce' : 'monitor'}">
            Switch to ${p.mode === 'monitor' ? 'enforce' : 'monitor'}
          </button>
          <button class="btn policy-yaml-btn" data-name="${esc(p.name)}">${st.open ? '▲ YAML' : '▼ YAML'}</button>
        </div>
      </div>
      <p style="font-size:11px;color:var(--text3);margin-top:6px">${esc(policyDesc(p.name))}</p>
      ${editorHtml}
    </div>`;
  });

  // Append kill switch section placeholder (filled by renderKsSection)
  html += `<div id="ks-section"></div>`;
  setContent(html);
  renderKsSection();

  // YAML show/hide toggle
  document.querySelectorAll('.policy-yaml-btn').forEach(btn => {
    btn.onclick = async () => {
      const name = btn.dataset.name;
      const st = policyEditorState[name] || {};
      if (st.open) {
        policyEditorState[name] = { ...st, open: false, editing: false };
      } else {
        if (st.content === undefined) {
          const r = await fetch(`/api/policies/${encodeURIComponent(name)}/yaml`);
          policyEditorState[name] = { open: true, content: r.ok ? await r.text() : 'Not found', editing: false };
        } else {
          policyEditorState[name] = { ...st, open: true, editing: false };
        }
      }
      renderPolicies();
    };
  });

  // Edit button (show textarea)
  document.querySelectorAll('.policy-edit-btn').forEach(btn => {

    btn.onclick = async () => {
      const name = btn.dataset.name;
      const ta = document.getElementById(`yaml-editor-${name}`);

      const content = ta.value;
      const msgEl = document.getElementById(`save-msg-${name}`);

      btn.disabled = true;

        const r = await fetch(`/api/policies/${encodeURIComponent(name)}/yaml`, {
          method: 'PUT', headers: { 'Content-Type': 'text/plain' }, body: content,
        });
        const d = await r.json();
        if (d.ok) {
          policyEditorState[name] = { open: true, content, editing: false };

          const newMsg = document.getElementById(`save-msg-${name}`);

        if (msgEl) { msgEl.className = 'save-err'; msgEl.textContent = e.message || 'Error'; }

      const mode = btn.dataset.mode;

        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ mode }),

      if (d.ok) {
        policiesData.policies.forEach(p => { if (p.name === name) p.mode = mode; });

        renderPolicies();
      } else {
        alert(d.error || 'Failed');
        btn.disabled = false;
      }

  requestAnimationFrame(() => {
    Object.entries(policyYamlScrollTops).forEach(([name, top]) => {
      const card = document.querySelector(`.policy-yaml-btn[data-name="${CSS.escape(name)}"]`)?.closest('.policy-card');
      const el = card?.querySelector('.yaml-pre') || card?.querySelector('.policy-textarea');
      if (el) el.scrollTop = top;
    });
    policyYamlScrollTops = {};
  });
}

async function openFileModal(skillDir, filePath, lineNumber, findingTitle, findingDesc) {
  const overlay = document.getElementById('file-modal-overlay');
  document.getElementById('file-modal-title').textContent = filePath;
  document.getElementById('file-modal-sub').textContent = lineNumber
    ? `Line ${lineNumber}${findingTitle ? ' · ' + findingTitle : ''}`
    : (findingTitle || '');
  const banner = document.getElementById('file-issue-banner');
  if (findingTitle || findingDesc) {
    banner.style.display = '';
    const lineRef = lineNumber ? ` at line ${lineNumber}` : '';
    banner.innerHTML = `<strong style="color:var(--red)">⚠ Issue${lineRef}:</strong> ${esc(findingTitle || '')}${findingDesc ? ' — ' + esc(findingDesc) : ''}`;
  } else {
    banner.style.display = 'none';
  }
  const body = document.getElementById('file-modal-body');
  body.innerHTML = '<div style="padding:40px;text-align:center;color:var(--text3)">Loading…</div>';
  overlay.style.display = 'flex';
  try {
    const r = await fetch(`/api/scanner/file?path=${encodeURIComponent(skillDir)}&file=${encodeURIComponent(filePath)}`);
    if (!r.ok) throw new Error(`Cannot read file (${r.status})`);
    const text = await r.text();
    const lines = text.split('\n');
    // Show context window: 30 lines before + all after, max 200 lines total
    const total = lines.length;
    const startLine = Math.max(1, (lineNumber || 1) - 30);
    const endLine = Math.min(total, startLine + 200);
    const shown = lines.slice(startLine - 1, endLine);
    const prefix = startLine > 1 ? `<div style="padding:6px 16px;font-size:10px;color:var(--text3);background:rgba(255,255,255,.02);border-bottom:1px solid var(--border)">… ${startLine - 1} lines above · <button onclick="renderAllLines(${JSON.stringify(skillDir)},${JSON.stringify(filePath)},${lineNumber || 0})" style="background:none;border:none;color:var(--accent);cursor:pointer;font-size:10px;padding:0">Show all ${total} lines</button></div>` : '';
    body.innerHTML = prefix + `<div class="file-lines" id="file-lines-container">${
      shown.map((line, i) => {
        const num = startLine + i;
        const isHl = num === lineNumber;
        return `<div class="file-line${isHl ? ' highlighted' : ''}" id="fl-${num}">` +
          `<span class="file-line-num">${num}</span>` +
          `<span class="file-line-content">${esc(line) || ' '}</span></div>`;
      }).join('')
    }</div>`;
    if (lineNumber) {
      const t = document.getElementById(`fl-${lineNumber}`);
      if (t) setTimeout(() => t.scrollIntoView({ block: 'center', behavior: 'smooth' }), 80);
    }
  } catch (e) {
    body.innerHTML = `<div style="padding:24px;color:var(--red)">${esc(e.message)}</div>`;
  }
}

window.renderAllLines = async function(skillDir, filePath, lineNumber) {
  const body = document.getElementById('file-modal-body');
  const savedScrollTop = body.scrollTop;
  body.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text3)">Loading full file…</div>';
  try {
    const r = await fetch(`/api/scanner/file?path=${encodeURIComponent(skillDir)}&file=${encodeURIComponent(filePath)}`);
    const text = await r.text();
    const lines = text.split('\n');
    body.innerHTML = `<div class="file-lines">${lines.map((line, i) => {
      const num = i + 1, isHl = num === lineNumber;
      return `<div class="file-line${isHl ? ' highlighted' : ''}" id="fl-${num}"><span class="file-line-num">${num}</span><span class="file-line-content">${esc(line) || ' '}</span></div>`;
    }).join('')}</div>`;
    requestAnimationFrame(() => { body.scrollTop = savedScrollTop; });
    if (lineNumber) {
      const t = document.getElementById(`fl-${lineNumber}`);
      if (t) setTimeout(() => t.scrollIntoView({ block: 'center', behavior: 'smooth' }), 80);
    }
  } catch (e) {
    body.innerHTML = `<div style="padding:24px;color:var(--red)">${esc(e.message)}</div>`;
  }
};

// ── Severity helpers ─────────────────────────────────────────────────────────────
function severityClass(sev) {
  const s = (sev || 'info').toLowerCase();
  return s === 'none' ? 'info' : s;
}
function severityLabel(sev) { return (!sev || sev === 'NONE') ? 'Clean' : sev; }

function analyzerTagHtml(a) {
  const raw = (a || 'static').toLowerCase().replace(/_analyzer$/, '').replace(/[_\s]/g, '');
  const names = { static:'Static', behavioral:'Behavioral', pipeline:'Pipeline', llm:'LLM', aidefense:'AI Defense', aidefenseanalyzer:'AI Defense', bytecode:'Bytecode' };
  return `<span class="analyzer-tag ${raw}">${names[raw] || a || 'Static'}</span>`;
}

const POLICY_MAP = {
  command_injection:'pipeline', data_exfiltration:'pipeline', policy_violation:'file_limits',
  prompt_injection:'rule_scoping', hidden_data:'hidden_files', credential_exposure:'credentials',
  dangerous_cleanup:'system_cleanup', code_security:'file_classification',
  tool_poisoning:'rule_scoping', social_engineering:'file_limits', manifest:'file_limits',
};
function policyLinkHtml(category) {
  const sec = POLICY_MAP[category] || 'analysis_thresholds';
  return `<a href="https://github.com/cisco-ai-defense/skill-scanner/blob/main/docs/POLICY.md" target="_blank"
    style="font-size:10px;color:var(--text3);text-decoration:none;white-space:nowrap" title="POLICY.md § ${sec}">⚙ ${sec}</a>`;
}

function renderScannerBadge(result) {
  if (!result) return '';
  if (result.scanning) return '<span class="scanner-badge scanning">Scanning…</span>';
  if (result.error && !(result.findings && result.findings.length)) return '<span class="scanner-badge error">Error</span>';
  const sev = result.max_severity || 'NONE';
  return `<span class="scanner-badge ${sev==='NONE'||sev==='INFO'?'clean':severityClass(sev)}">${severityLabel(sev)}</span>`;
}

function renderScannerFindings(findings, skillDir) {
  if (!findings || !findings.length) return '';
  return `<div class="scanner-findings" style="margin-top:10px">${findings.map(f => {
    const hasLine = f.file_path && f.line_number != null;

          <a href="https://github.com/cisco-ai-defense/skill-scanner/blob/main/docs/POLICY.md" target="_blank" style="color:var(--accent)">Full policy reference ↗</a>
        </div>
      </div>
      <div class="settings-group">
        <span class="settings-label">Analyzers</span>
        <div style="display:flex;gap:3px;flex-wrap:wrap;margin-bottom:8px;align-items:center">
          ${analyzerTagHtml('static')}${analyzerTagHtml('pipeline')}${analyzerTagHtml('bytecode')}
          <span style="font-size:10px;color:var(--text3)">always active</span>
        </div>
        <div class="toggle-row" style="margin-bottom:7px">
          <label class="toggle-sw"><input id="toggle-behavioral" type="checkbox" ${scannerConfig.useBehavioral?'checked':''}/><span class="toggle-slider"></span></label>
          ${analyzerTagHtml('behavioral')}
          <div><div style="font-size:11px;color:var(--text2)">AST Dataflow</div><div style="font-size:10px;color:var(--text3)">Tracks tainted data through Python AST</div></div>
        </div>
        <div class="toggle-row">
          <label class="toggle-sw"><input id="toggle-aidefense" type="checkbox" ${scannerConfig.useAiDefense?'checked':''}/><span class="toggle-slider"></span></label>
