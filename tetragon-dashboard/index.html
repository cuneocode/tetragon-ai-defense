}

async function loadScannerSkills() {
  try {
    const r = await fetch('/api/scanner/skills');
    const d = await r.json();
    scannerSkills = d.skills || [];
  } catch { scannerSkills = []; }
}

async function scanSingleSkill(skill) {
  scannerResults = { ...scannerResults, [skill.name]: { scanning: true } };
  renderScanner();
  try {
    const r = await fetch('/api/scanner/scan', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ path: skill.path }),
    });
    const d = await r.json();
    scannerResults = { ...scannerResults, [skill.name]: { ...d, _skillPath: skill.path } };
  } catch (e) {
    scannerResults = { ...scannerResults, [skill.name]: { error: e.message, findings: [], _skillPath: skill.path } };
  }
  renderScanner();
}

async function scanAllSkills() {
  scannerRunning = true;
  renderScanner();
  for (const skill of scannerSkills) {
    scannerResults = { ...scannerResults, [skill.name]: { scanning: true } };
    renderScanner();
    try {
      const r = await fetch('/api/scanner/scan', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ path: skill.path }),
      });
      const d = await r.json();
      scannerResults = { ...scannerResults, [skill.name]: { ...d, _skillPath: skill.path } };
    } catch (e) {
      scannerResults = { ...scannerResults, [skill.name]: { error: e.message, findings: [], _skillPath: skill.path } };
    }
    renderScanner();
  }
  scannerRunning = false;
  renderScanner();
}

function renderScanner() {
  const results = Object.values(scannerResults);
  const done = results.filter(r => !r.scanning);
  const totalFindings = done.reduce((s,r) => s + (r.findings_count||r.findings?.length||0), 0);
  const critical = done.reduce((s,r) => s + (r.findings||[]).filter(f=>f.severity==='CRITICAL').length, 0);
  const high     = done.reduce((s,r) => s + (r.findings||[]).filter(f=>f.severity==='HIGH').length, 0);
  const medium   = done.reduce((s,r) => s + (r.findings||[]).filter(f=>f.severity==='MEDIUM').length, 0);
  const low      = done.reduce((s,r) => s + (r.findings||[]).filter(f=>f.severity==='LOW').length, 0);
  const clean    = done.filter(r => (r.findings_count||r.findings?.length||0)===0 && !r.error).length;
  const errors   = done.filter(r => r.error && !(r.findings?.length)).length;
  const pct = scannerRunning && scannerSkills.length > 0 ? Math.round((done.length/scannerSkills.length)*100) : 0;

  const activeAnalyzers = [
    analyzerTagHtml('static'), analyzerTagHtml('pipeline'), analyzerTagHtml('bytecode'),
    scannerConfig.useBehavioral ? analyzerTagHtml('behavioral') : '',
    scannerConfig.useAiDefense && scannerConfig.aiDefenseApiKey ? analyzerTagHtml('aidefense') : '',
  ].filter(Boolean).join(' ');

  let html = `
    <div class="shell-header">
      <div>
        <h2 style="display:flex;align-items:center;gap:8px">
          Skill Scanner
          <span style="font-size:10px;padding:3px 9px;background:rgba(99,102,241,.12);color:var(--accent);border-radius:4px;font-weight:600">Cisco AI Defense</span>
        </h2>
        <div class="sub" style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:5px">
          Prompt injection · data exfiltration · malicious patterns
          <span style="color:var(--border)">·</span>
          <span style="font-size:11px;display:flex;align-items:center;gap:3px">Active: ${activeAnalyzers}</span>
        </div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn" id="scanner-settings-btn">${scannerSettingsOpen ? '✕ Settings' : '⚙ Settings'}</button>
        <button class="btn" id="scanner-refresh" ${scannerRunning ? 'disabled' : ''}>Refresh</button>
        <button class="btn primary" id="scanner-scan-all" ${scannerRunning||!scannerSkills.length ? 'disabled' : ''}>
          ${scannerRunning ? 'Scanning…' : 'Scan All'}
        </button>
        ${done.length > 0 ? '<button class="btn" id="scanner-clear">Clear</button>' : ''}
      </div>
    </div>
    ${scannerSettingsOpen ? renderScannerSettings() : ''}`;

  if (scannerRunning) {
    html += `<div class="scanner-progress">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px">
        <span style="font-size:11px;color:var(--text3)">Scanning skills…${scannerConfig.useAiDefense&&scannerConfig.aiDefenseApiKey?' (AI Defense cloud enabled)':''}</span>
        <span style="font-size:11px;font-family:var(--mono);color:var(--text2)">${done.length} / ${scannerSkills.length}</span>
      </div>
      <div class="scanner-progress-bar"><div class="scanner-progress-fill" style="width:${pct}%"></div></div>
    </div>`;
  }

  if (done.length > 0) {
    html += `<div class="scanner-stats">
      <div class="scanner-stat"><div class="label">Scanned</div><div class="value">${done.length}</div></div>
      <div class="scanner-stat"><div class="label">Findings</div><div class="value" style="color:${totalFindings>0?'var(--amber)':'var(--green)'}">${totalFindings}</div></div>
      <div class="scanner-stat"><div class="label">Critical</div><div class="value" style="color:${critical>0?'#c084fc':'var(--text3)'}">${critical}</div></div>
      <div class="scanner-stat"><div class="label">High</div><div class="value" style="color:${high>0?'var(--red)':'var(--text3)'}">${high}</div></div>
      <div class="scanner-stat"><div class="label">Medium</div><div class="value" style="color:${medium>0?'var(--amber)':'var(--text3)'}">${medium}</div></div>
      <div class="scanner-stat"><div class="label">Low</div><div class="value" style="color:var(--text3)">${low}</div></div>
      <div class="scanner-stat"><div class="label">Clean</div><div class="value" style="color:var(--green)">${clean}</div></div>
      ${errors>0?`<div class="scanner-stat"><div class="label">Errors</div><div class="value" style="color:var(--red)">${errors}</div></div>`:''}
    </div>`;
  }

  if (!scannerSkills.length && !scannerRunning) {
    html += '<div class="empty">No skills found. Click Refresh to discover skills.</div>';
  }

  if (scannerSkills.length > 0) {
    html += `<div style="margin-bottom:24px">${scannerSkills.map(skill => {
      const result = scannerResults[skill.name];
      const skillDir = result?._skillPath || skill.path;
      const expanded = scannerSelectedSkill === skill.name;
      const findings = result?.findings || [];
      const durStr = result?.scan_duration_seconds != null ? result.scan_duration_seconds.toFixed(2)+'s' : '';
      const usedTags = result?.analyzers_used?.length
        ? `<span style="display:flex;gap:2px;flex-wrap:wrap">${result.analyzers_used.map(a => analyzerTagHtml(a)).join('')}</span>` : '';
      const bySev = {};
      findings.forEach(f => { bySev[f.severity]=(bySev[f.severity]||0)+1; });
      const cols = {CRITICAL:'#c084fc',HIGH:'var(--red)',MEDIUM:'var(--amber)',LOW:'var(--text3)',INFO:'var(--text3)'};
      const findingSummary = !result?.scanning && findings.length>0
        ? Object.entries(bySev).filter(([,n])=>n>0).map(([s,n])=>`<span style="color:${cols[s]||'var(--text3)'}">${n} ${s.toLowerCase()}</span>`).join(' · ')
        : '';
      return `<div class="scanner-skill${expanded&&result&&!result.scanning?' expanded':''}" data-skill="${esc(skill.name)}" data-skill-dir="${esc(skillDir)}">
        <div class="scanner-skill-head">
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
              <span class="scanner-skill-name">${esc(skill.name)}</span>
              ${result ? renderScannerBadge(result) : ''}
              ${durStr ? `<span style="font-size:10px;color:var(--text3)">${durStr}</span>` : ''}
            </div>
            ${!result?.scanning&&findings.length===0&&result&&!result.error?'<div style="font-size:11px;color:var(--green);margin-top:3px">No findings detected</div>':''}
            ${findingSummary?`<div style="font-size:11px;margin-top:3px;display:flex;align-items:center;gap:8px;flex-wrap:wrap"><span>${findingSummary}</span>${usedTags}</div>`:(usedTags?`<div style="margin-top:3px">${usedTags}</div>`:'')}
            ${result?.error&&!findings.length?`<div style="font-size:11px;color:var(--red);margin-top:3px">${esc(result.error)}</div>`:''}
          </div>
          <button class="btn skill-scan-btn" style="font-size:11px;flex-shrink:0;margin-left:8px"
            data-scan-skill="${esc(skill.name)}" ${scannerRunning||result?.scanning?'disabled':''}>
            ${result?.scanning ? 'Scanning…' : 'Scan'}
          </button>
        </div>
        ${expanded&&!result?.scanning&&findings.length>0 ? renderScannerFindings(findings, skillDir) : ''}
      </div>`;
    }).join('')}</div>`;
  }

  html += `<div class="scanner-about">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;flex-wrap:wrap;margin-bottom:12px">
      <h4>How Skill Scanner Works</h4>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <a href="https://github.com/cisco-ai-defense/skill-scanner" target="_blank" style="font-size:11px">GitHub ↗</a>
        <a href="https://github.com/cisco-ai-defense/skill-scanner/blob/main/docs/POLICY.md" target="_blank" style="font-size:11px">Policy Docs ↗</a>
        <a href="https://github.com/cisco-ai-defense/skill-scanner/blob/main/docs/aidefense-analyzer.md" target="_blank" style="font-size:11px">AI Defense Docs ↗</a>
        <a href="https://github.com/cisco-ai-defense/skill-scanner/blob/main/docs/threat-taxonomy.md" target="_blank" style="font-size:11px">Threat Taxonomy ↗</a>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px">
      <div><span class="settings-label" style="margin-bottom:5px;display:block">Core (always active)</span>
        <div style="font-size:11px;color:var(--text2);line-height:1.9">
          ${analyzerTagHtml('static')} YAML + YARA patterns<br>
          ${analyzerTagHtml('pipeline')} Shell taint analysis<br>
          ${analyzerTagHtml('bytecode')} .pyc integrity</div></div>
      <div><span class="settings-label" style="margin-bottom:5px;display:block">Optional (⚙ Settings)</span>
        <div style="font-size:11px;color:var(--text2);line-height:1.9">
          ${analyzerTagHtml('behavioral')} AST dataflow (Python)<br>
          ${analyzerTagHtml('aidefense')} Cisco cloud API<br>
          <span style="font-size:10px;color:var(--text3)">Enable in ⚙ Settings</span></div></div>
      <div><span class="settings-label" style="margin-bottom:5px;display:block">Policy Presets</span>
        <div style="font-size:11px;color:var(--text2);line-height:1.9">
          <strong style="color:var(--text)">balanced</strong> — broad allowlists<br>
          <strong style="color:var(--text)">strict</strong> — max coverage<br>
          <strong style="color:var(--text)">permissive</strong> — trusted use</div></div>
      <div><span class="settings-label" style="margin-bottom:5px;display:block">What Gets Analyzed</span>
        <div style="font-size:11px;color:var(--text2);line-height:1.9">
          SKILL.md + manifest<br>
          Markdown · shell · Python<br>
          Binaries · .pyc bytecode</div></div>
    </div>
    <p style="margin-top:10px;font-size:10px;color:var(--text3);line-height:1.6">
      ⚠ Best-effort detection. No findings ≠ no risk. False positives and negatives expected. Human review essential.
    </p>
  </div>`;

  html += renderScannerLogs();

  setContent(html);
  bindScannerEvents();
}

function prettyJson(str) {
  try { return JSON.stringify(JSON.parse(str), null, 2); } catch { return str; }
}

function renderScannerLogs() {
  const phaseIcon  = { start: '▶', complete: '✓', 'aidefense-result': '⚡' };
  const phaseColor = { start: 'var(--text3)', complete: 'var(--green)', 'aidefense-result': 'var(--accent)' };
  const outcomeColor = { success: 'var(--green)', error: 'var(--red)', skipped: 'var(--yellow)' };

  const logsHtml = scannerLogs.length === 0
    ? `<div style="padding:28px 0;text-align:center;color:var(--text3);font-size:13px">
         No scan logs yet — run a scan to see command &amp; response output here.
       </div>`
    : scannerLogs.map(entry => {
        const id = entry.id;
        const ts = new Date(entry.time);
        const timeStr = ts.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'});
        const dateStr = ts.toLocaleDateString([], {month:'short',day:'numeric'});

        const isError   = entry.outcome === 'error';
        const icon  = isError ? '✕' : (phaseIcon[entry.phase]  || '·');
        const color = isError ? 'var(--red)' : (phaseColor[entry.phase] || 'var(--text3)');
        const oColor = entry.outcome ? (outcomeColor[entry.outcome] || color) : color;

        const analyzerPills = (entry.analyzers || []).map(a =>
          `<span class="analyzer-tag ${a}">${a}</span>`).join('');
        const aiKeyBadge = entry.aiDefenseEnabled
          ? (entry.aiDefenseApiKeyPresent
              ? `<span class="scan-badge scan-badge-ok">key ✓</span>`
              : `<span class="scan-badge scan-badge-err">no key</span>`)
          : '';
        const exitBadge = entry.exitCode != null && entry.exitCode !== 0
          ? `<span class="scan-badge scan-badge-err">exit ${entry.exitCode}</span>` : '';

        // ── command block (always shown) ──────────────────────────────────
        const cmdBlock = `<div class="scan-cmd-block">
          <span class="scan-cmd-label">CMD</span>
          <code class="scan-cmd-code">${esc(entry.command)}</code>
        </div>`;

        // ── stdout / stderr expand panels ─────────────────────────────────
        const hasStdout = !!(entry.rawStdout && entry.rawStdout.trim());
        const hasStderr = !!(entry.rawStderr && entry.rawStderr.trim());
        const stdoutOpen = scannerLogExpanded.has(`${id}-stdout`);
        const stderrOpen = scannerLogExpanded.has(`${id}-stderr`);

        const outputBtns = (hasStdout || hasStderr) ? `<div class="scan-output-btns">
          ${hasStdout ? `<button class="scan-output-btn" data-log-id="${id}" data-stream="stdout">
            ${stdoutOpen ? '▾' : '▸'} stdout
            <span style="font-size:10px;opacity:.6">${entry.rawStdout.length > 1024 ? Math.round(entry.rawStdout.length/1024)+'KB' : entry.rawStdout.length+'B'}</span>
          </button>` : ''}
          ${hasStderr ? `<button class="scan-output-btn scan-output-btn-err" data-log-id="${id}" data-stream="stderr">
            ${stderrOpen ? '▾' : '▸'} stderr
            <span style="font-size:10px;opacity:.6">${entry.rawStderr.length > 1024 ? Math.round(entry.rawStderr.length/1024)+'KB' : entry.rawStderr.length+'B'}</span>
          </button>` : ''}
        </div>` : '';

        const stdoutPanel = hasStdout && stdoutOpen ? `<pre class="scan-raw-pre scan-raw-stdout">${esc(prettyJson(entry.rawStdout))}</pre>` : '';
        const stderrPanel = hasStderr && stderrOpen ? `<pre class="scan-raw-pre scan-raw-stderr">${esc(entry.rawStderr)}</pre>` : '';

        // ── AI Defense URL note ───────────────────────────────────────────
        const urlNote = entry.aiDefenseApiUrl
          ? `<div class="scan-meta-line">API URL: ${esc(entry.aiDefenseApiUrl)}</div>` : '';

        return `<div class="scan-log-entry" data-phase="${entry.phase}" data-outcome="${entry.outcome||''}">
          <div class="scan-log-icon" style="color:${oColor}">${icon}</div>
          <div class="scan-log-body">
            <div class="scan-log-top">
              <span class="scan-log-skill">${esc(entry.skill)}</span>
              <span class="scan-log-analyzers">${analyzerPills}</span>
              ${aiKeyBadge}${exitBadge}
              ${entry.findingsCount != null ? `<span class="scan-meta-pill">${entry.findingsCount} finding(s)</span>` : ''}
              ${entry.durationMs  != null ? `<span class="scan-meta-pill">${entry.durationMs}ms</span>` : ''}
              <span class="scan-log-time">${dateStr} ${timeStr}</span>
            </div>
            <div class="scan-log-msg" style="color:${color}">${esc(entry.message)}</div>
            <div class="scan-meta-line">policy: <strong>${esc(entry.policy)}</strong>${urlNote ? ' · ' + urlNote.replace(/^<div[^>]*>|<\/div>$/g,'') : ''}</div>
            ${cmdBlock}
            ${outputBtns}${stdoutPanel}${stderrPanel}
          </div>
        </div>`;
      }).join('');

  return `<div class="scanner-logs-section">
    <div class="scanner-logs-header">
      <button id="scanner-logs-toggle" class="scan-log-toggle-btn">
        <span class="scan-log-chevron">${scannerLogsOpen ? '▾' : '▸'}</span>
        <span style="font-weight:600;font-size:13px">Scan Activity Log</span>
        ${scannerLogs.length ? `<span class="scan-log-count">${scannerLogs.length}</span>` : ''}
        <span style="font-size:11px;color:var(--text3)">— command &amp; raw API response output</span>
      </button>
      <div style="display:flex;gap:8px">
        <button class="btn" id="scanner-logs-refresh" style="font-size:11px;padding:4px 10px">↺ Refresh</button>
        ${scannerLogs.length ? `<button class="btn" id="scanner-logs-clear" style="font-size:11px;padding:4px 10px;color:var(--red)">✕ Clear</button>` : ''}
      </div>
    </div>
    ${scannerLogsOpen ? `<div class="scan-log-list">${logsHtml}</div>` : ''}
  </div>`;
}

function bindScannerEvents() {
  const logsToggle = $content.querySelector('#scanner-logs-toggle');
  if (logsToggle) logsToggle.onclick = () => {
    scannerLogsOpen = !scannerLogsOpen;
    if (scannerLogsOpen) loadScannerLogs().then(() => renderScanner());
    else renderScanner();
  };
  const logsRefresh = $content.querySelector('#scanner-logs-refresh');
  if (logsRefresh) logsRefresh.onclick = () => {
    scannerLogsOpen = true;
    loadScannerLogs().then(() => renderScanner());
  };
  const logsClear = $content.querySelector('#scanner-logs-clear');
  if (logsClear) logsClear.onclick = (e) => {
    e.stopPropagation();
    scannerLogExpanded.clear();
    clearScannerLogs().then(() => renderScanner());
  };

  // stdout / stderr expand toggle buttons (event delegation on the log list)
  const logList = $content.querySelector('.scan-log-list');
  if (logList) logList.addEventListener('click', e => {
    const btn = e.target.closest('.scan-output-btn');
    if (!btn) return;
    const logId  = btn.dataset.logId;
    const stream = btn.dataset.stream;
    const key = `${logId}-${stream}`;
    if (scannerLogExpanded.has(key)) scannerLogExpanded.delete(key);
    else scannerLogExpanded.add(key);
    renderScanner();
  });

  const settingsBtn = $content.querySelector('#scanner-settings-btn');
  if (settingsBtn) settingsBtn.onclick = () => { scannerSettingsOpen = !scannerSettingsOpen; renderScanner(); };
  const refreshBtn = $content.querySelector('#scanner-refresh');
  if (refreshBtn) refreshBtn.onclick = () => loadScannerSkills().then(() => renderScanner());
  const scanAllBtn = $content.querySelector('#scanner-scan-all');
  if (scanAllBtn) scanAllBtn.onclick = () => scanAllSkills();
  const clearBtn = $content.querySelector('#scanner-clear');
  if (clearBtn) clearBtn.onclick = () => { scannerResults={}; scannerSelectedSkill=null; renderScanner(); };

  const doneBtn = $content.querySelector('#settings-done-btn');
  if (doneBtn) doneBtn.onclick = () => { scannerSettingsOpen=false; renderScanner(); };
  $content.querySelectorAll('[data-preset]').forEach(btn => {
    btn.onclick = () => { patchScannerConfig({policy:btn.dataset.preset}); renderScanner(); };
  });
  const behavToggle = $content.querySelector('#toggle-behavioral');
  if (behavToggle) behavToggle.onchange = () => patchScannerConfig({useBehavioral:behavToggle.checked});
  const aiToggle = $content.querySelector('#toggle-aidefense');
  if (aiToggle) aiToggle.onchange = () => { patchScannerConfig({useAiDefense:aiToggle.checked}); renderScanner(); };
  const keyInp = $content.querySelector('#aidef-key-input');
  if (keyInp) keyInp.oninput = () => { scannerConfig.aiDefenseApiKey = keyInp.value; };
  const urlInp = $content.querySelector('#aidef-url-input');
  if (urlInp) urlInp.oninput = () => { scannerConfig.aiDefenseApiUrl = urlInp.value; };
  const saveBtn = $content.querySelector('#aidef-save-btn');
  if (saveBtn) saveBtn.onclick = () => {
    if (keyInp) scannerConfig.aiDefenseApiKey = keyInp.value;
    if (urlInp) scannerConfig.aiDefenseApiUrl = urlInp.value;
    patchScannerConfig({aiDefenseApiKey:scannerConfig.aiDefenseApiKey, aiDefenseApiUrl:scannerConfig.aiDefenseApiUrl});
    const msg = $content.querySelector('#aidef-msg');
    if (msg) { msg.textContent='✓ Saved'; setTimeout(()=>{if(msg)msg.textContent='';},2500); }
  };

  $content.querySelectorAll('.scanner-skill').forEach(el => {
    el.onclick = (e) => {
      if (e.target.closest('button,a,.scanner-file-link,.scanner-finding')) return;
      const name = el.dataset.skill;
      scannerSelectedSkill = scannerSelectedSkill===name ? null : name;
      renderScanner();
    };
  });
  $content.querySelectorAll('.skill-scan-btn').forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      const skill = scannerSkills.find(s => s.name===btn.dataset.scanSkill);
      if (skill) scanSingleSkill(skill);
    };
  });
  $content.querySelectorAll('.scanner-file-link').forEach(link => {
    link.onclick = (e) => {
      e.stopPropagation();
      const finding = link.closest('.scanner-finding');
      const skillEl = link.closest('.scanner-skill');
      if (!finding||!skillEl) return;
      const filePath = finding.dataset.filePath;
      const lineNum  = parseInt(finding.dataset.line,10)||0;
      const title    = finding.dataset.title;
      const desc     = finding.dataset.desc;
      const skillDir = skillEl.dataset.skillDir;
      openFileModal(skillDir, filePath, lineNum, title, desc);
    };
  });
}


// ─── Poll ─────────────────────────────────────────────────────────────────────
async function poll() {
  try {
    if (tab === 'about') {
      if ($content.querySelector('.md-body')) return;
      if (!readmeCache) {
        setContent('<div class="loading">Loading…</div>');
        const r = await fetch('/api/readme');
        if (r.ok) readmeCache = await r.text();
        else readmeCache = '# Error\n\nCould not load README.md';
      }
      await renderAbout(readmeCache);
      return;
    }
    if (tab === 'policies') {
      const [rPol, rOv, rKs] = await Promise.all([
        fetch('/api/policies'), fetch('/api/overview'), fetch('/api/killswitches'),
      ]);
      const pol = await rPol.json();
      const ov  = await rOv.json();
      const ks  = await rKs.json();
      policiesData = { policies: pol.policies || [], overview: ov, ks, policiesError: pol.error || null };
      ksState = ks;
      syncKsCountdown();
      updateEnforcingBadge();
      renderPolicies();
      return;
    }
    if (tab === 'activity') {
      const r = await fetch(`/api/activity?since=${encodeURIComponent(since)}&limit=200`);
      const d = await r.json();
      let events = d.events || [];
      if (filters.kind) events = events.filter(e => (e.kind || '').includes(filters.kind) || (e.source || '').includes(filters.kind));
      renderActivity({ events, total: events.length });
      return;
    }
    if (tab === 'llm') {
      const url = `/api/events/net?since=${encodeURIComponent(since)}${filters.remote ? '&remote=' + encodeURIComponent(filters.remote) : ''}`;
      const r = await fetch(url);
      const d = await r.json();
      let events = d.events || [];
      if (filters.unknown) events = events.filter(e => e.unknownEgress);
      renderLLM({ events, total: events.length });
      return;
    }
    if (tab === 'tools') {
      const url = `/api/events/exec?since=${encodeURIComponent(since)}${filters.q ? '&q=' + encodeURIComponent(filters.q) : ''}`;
      const r = await fetch(url);
      const d = await r.json();
      renderTools(d);
      return;
    }
    if (tab === 'fileops') {
      const qs = [
        `since=${encodeURIComponent(since)}`,
        filters.path      ? `path=${encodeURIComponent(filters.path)}`           : '',
        filters.operation ? `operation=${encodeURIComponent(filters.operation)}` : '',
      ].filter(Boolean).join('&');
      const r = await fetch(`/api/events/file?${qs}`);
      const d = await r.json();
      renderFileOps(d);
      return;
    }
    if (tab === 'skills') {
      const r = await fetch(`/api/skills?since=${encodeURIComponent(since)}`);
      const d = await r.json();
      let events = d.events || [];
      if (filters.flag === 'critical') events = events.filter(e => e.outsideSkill && e.sensitive);
      if (filters.q) events = events.filter(e => (e.process || '').includes(filters.q) || (e.path || '').includes(filters.q));
      renderSkills({ events, total: events.length });
      return;
    }
    if (tab === 'scanner') {
      if (!scannerConfigLoaded) await loadScannerConfig();
      if (!scannerSkills.length) await loadScannerSkills();
      renderScanner();
      return;
    }
  } catch (e) {
    setContent(`<div class="empty">Error: ${esc(e.message)}</div>`);
  }
}

// ─── Kill switch management ────────────────────────────────────────────────────
// Guard: prevents double-clicks and race conditions with the auto-refresh intervals.
// When ksToggling[type] is true, auto-refresh skips updating that switch's UI.
const ksToggling = { exec: false, net: false };

function fmtKsCountdown(secs) {
  if (secs == null) return '';
  return ` (${secs}s)`;
}

function ksHeaderBtnHTML(type) {
  if (ksToggling[type]) {
    return `<span class="ks-dot"></span><span style="opacity:.6">Working…</span>`;
  }
  if (type === 'exec') {
    const active = !!ksState.exec?.active;
    const secs = ksClientCountdown.exec;
    return `<span class="ks-dot"></span>${active ? `⛔ Exec Blocked${fmtKsCountdown(secs)}` : 'Block Exec (60s)'}`;
  }
  const active = !!ksState.net?.active;
  const secs = ksClientCountdown.net;
  return `<span class="ks-dot"></span>${active ? `🔌 Net Isolated${fmtKsCountdown(secs)}` : 'Isolate Net (60s)'}`;
}

function updateKsButtons() {
  ['exec', 'net'].forEach(type => {
    const btn = document.getElementById(`ks-${type}-btn`);
    if (!btn) return;
    const toggling = ksToggling[type];
    const active   = !!ksState[type]?.active;
    btn.classList.toggle('active', active && !toggling);
    btn.disabled = toggling;
    btn.innerHTML = ksHeaderBtnHTML(type);
    if (!toggling) {
      const secs = ksClientCountdown[type];
      btn.title = active
        ? `Lockout ACTIVE${secs != null ? ` — ${secs}s remaining` : ''}. Click to end early.`
        : type === 'exec'
          ? 'Temporarily block all tool/subprocess execution from OpenClaw for 60 seconds'
          : 'Temporarily block all outbound network connections from OpenClaw for 60 seconds';
    }
  });
}

function syncKsCountdown() {
  ksClientCountdown.exec = ksState.exec?.active ? (ksState.exec.remainingSeconds ?? null) : null;
  ksClientCountdown.net  = ksState.net?.active  ? (ksState.net.remainingSeconds  ?? null) : null;
  const anyActive = !!ksState.exec?.active || !!ksState.net?.active;
  if (anyActive && !ksCountdownInterval) {
    ksCountdownInterval = setInterval(() => {
      let stillActive = false;
      ['exec', 'net'].forEach(t => {
        if (ksClientCountdown[t] != null && ksClientCountdown[t] > 0) {
          ksClientCountdown[t]--;
          if (ksClientCountdown[t] > 0) stillActive = true;
        }
      });
      updateKsButtons();
      // Only re-render the lightweight ks section, not the full policies page
      const ksel = document.getElementById('ks-section');
      if (ksel) renderKsSection();
      if (!stillActive) { clearInterval(ksCountdownInterval); ksCountdownInterval = null; }
    }, 1000);
  } else if (!anyActive && ksCountdownInterval) {
    clearInterval(ksCountdownInterval);
    ksCountdownInterval = null;
  }
}

async function refreshKillSwitches() {
  try {
    const r = await fetch('/api/killswitches');
    if (!r.ok) return;
    const fresh = await r.json();
    // Merge: don't overwrite state for a type that is currently being toggled
    ['exec', 'net'].forEach(t => {
      if (!ksToggling[t]) ksState[t] = fresh[t];
    });
    syncKsCountdown();
    updateKsButtons();
    const ksel = document.getElementById('ks-section');
    if (ksel) renderKsSection();
  } catch {}
}

async function toggleKillSwitch(type) {
  if (ksToggling[type]) return;  // prevent double-click / re-entrant calls

  const current = !!ksState[type]?.active;
  ksToggling[type] = true;

  // Immediate visual feedback — update both header btn and card btn
  updateKsButtons();
  const ksel = document.getElementById('ks-section');
  if (ksel) renderKsSection();

  try {
    const r = await fetch(`/api/killswitches/${type}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ active: !current }),
    });
    const d = await r.json();
    if (!d.ok) alert(d.error || `Failed to ${current ? 'end' : 'activate'} lockout`);
  } catch (e) {
    alert(e.message || 'Network error — could not reach dashboard server');
  } finally {
    ksToggling[type] = false;
    // Sync real state from server before re-rendering
    try {
      const r2 = await fetch('/api/killswitches');
      if (r2.ok) {
        const fresh = await r2.json();
        ksState = fresh;
        syncKsCountdown();
      }
    } catch {}
    updateKsButtons();
    if (document.getElementById('ks-section')) renderKsSection();
  }
}

document.getElementById('ks-exec-btn').onclick = () => toggleKillSwitch('exec');
document.getElementById('ks-net-btn').onclick  = () => toggleKillSwitch('net');

poll();
setInterval(poll, 5000);
refreshKillSwitches();
setInterval(refreshKillSwitches, 5000);

// Eagerly fetch policy modes so the modal can show correct mode even before visiting Policies tab
fetch('/api/policies').then(r => r.json()).then(d => {
  policiesData.policies = d.policies || [];
  updateEnforcingBadge();
}).catch(() => {});
})();
</script>
