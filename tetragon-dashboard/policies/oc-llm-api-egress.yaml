apiVersion: cilium.io/v1alpha1
kind: TracingPolicy
metadata:
  name: oc-llm-api-egress
spec:
  kprobes:
    - call: "tcp_connect"
      syscall: false
      selectors:
        - matchActions:
            - action: Post
            - action: Sigkill
      args:
        - index: 0
          type: "sock"
